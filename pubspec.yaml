name: le_repere
description: "Découvre les meilleurs endroits de Valenciennes !"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  firebase_ui_auth: ^3.0.1
  firebase_ui_oauth_google: ^2.0.1
  flutter:
    sdk: flutter
  flutter_svg: 2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/repere_icon_192.png"
